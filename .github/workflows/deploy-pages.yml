name: Deploy to GitHub Pages

# Mirror of the Render deploy. Builds the same Vite SPA on every
# push to main, publishes the static bundle to the gh-pages branch
# so the live URL `https://luna-sa.github.io/basgiath-workshop/`
# always reflects the latest commit. Acts as a hot standby in case
# Render is blocked by a corporate firewall or goes down.

on:
  push:
    branches: [main]
  # Manual trigger via the Actions tab — useful for replaying a
  # build without pushing a no-op commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy when a newer commit lands so the
# gh-pages branch reflects the freshest main, never a stale build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        # `npm install` instead of `npm ci` — the lock file has
        # transitive deps (@emnapi/*) that npm ci flags as out of
        # sync on Linux runners. install reconciles them silently.
        run: npm install

      - name: Write .env.production from secrets
        # Vite reads import.meta.env.VITE_* from .env files at
        # build time, NOT from process env. To make the CI secrets
        # reach the bundle, we materialise them as a .env.production
        # file just before `vite build` runs. The file is written
        # in the workspace and never committed.
        run: |
          cat > .env.production <<EOF
          VITE_GSHEETS_API=${{ secrets.VITE_GSHEETS_API }}
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_FACILITATOR_TOKEN=${{ secrets.VITE_FACILITATOR_TOKEN }}
          VITE_WORKSHOP_API=${{ secrets.VITE_WORKSHOP_API }}
          VITE_GROQ_API_KEY=${{ secrets.VITE_GROQ_API_KEY }}
          EOF
          # Sanity check — log var names only (values stay redacted)
          echo "Wrote $(grep -c '^VITE_' .env.production) VITE_ keys"

      - name: Build (GH Pages base path)
        run: BASE_PATH=/basgiath-workshop/ npm run build

      # GitHub Pages serves static files — there's no SPA fallback
      # for path-based routes like /register. Copying index.html as
      # 404.html makes GH Pages serve the SPA for any unmatched
      # path (it falls through to React Router which then reads
      # the URL and renders the right page).
      - name: SPA fallback (404 → index)
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
